<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroAchievements Share</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-primary: #00ff41;
            --accent-secondary: #ff00ff;
            --accent-tertiary: #00d9ff;
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
        }

        [data-theme="light"] {
            --accent-primary: #00aa2d;
            --accent-secondary: #cc00cc;
            --accent-tertiary: #0088aa;
            --bg-primary: #f0f0f0;
            --bg-secondary: #e0e0e0;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* CRT Scanline Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid var(--accent-primary);
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            color: var(--accent-primary);
            text-shadow: 0 0 10px var(--accent-primary);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-secondary);
            color: var(--accent-primary);
            border: 2px solid var(--accent-primary);
            padding: 10px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            z-index: 1001;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: var(--accent-primary);
            color: var(--bg-primary);
            box-shadow: 0 0 20px var(--accent-primary);
        }

        .profile-section {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 30px;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--bg-secondary);
            border: 2px solid var(--accent-primary);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
        }

        .avatar-container {
            position: relative;
        }

        .avatar-container img {
            width: 100%;
            border: 3px solid var(--accent-primary);
            box-shadow: 0 0 20px var(--accent-primary);
        }

        .user-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .username {
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            color: var(--accent-primary);
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--accent-primary);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-box {
            background: var(--bg-primary);
            padding: 15px;
            border: 1px solid var(--accent-secondary);
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            color: var(--accent-secondary);
            margin-bottom: 5px;
        }

        .stat-value {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: var(--accent-tertiary);
            text-shadow: 0 0 5px var(--accent-tertiary);
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .achievement-card {
            background: var(--bg-secondary);
            border: 1px solid var(--accent-secondary);
            padding: 20px;
            transition: all 0.3s;
        }

        .achievement-card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            transform: translateY(-5px);
        }

        .achievement-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: var(--accent-secondary);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .achievement-game {
            font-size: 18px;
            color: var(--accent-tertiary);
            margin-bottom: 5px;
        }

        .achievement-date {
            font-size: 14px;
            color: var(--text-secondary);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 2px solid var(--accent-primary);
            color: var(--text-secondary);
        }

        /* Credentials Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-primary);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.3);
        }

        .modal-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: var(--accent-primary);
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--accent-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 18px;
            color: var(--accent-tertiary);
            margin-bottom: 10px;
            display: block;
        }

        .form-input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--accent-secondary);
            color: var(--text-primary);
            padding: 12px;
            font-family: 'VT323', monospace;
            font-size: 18px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .form-help {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            border: 2px solid;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--accent-primary);
            box-shadow: 0 0 20px var(--accent-primary);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-secondary);
            border-color: var(--accent-secondary);
        }

        .btn-secondary:hover {
            background: var(--accent-secondary);
            color: var(--bg-primary);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--accent-primary);
            font-size: 24px;
        }

        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid red;
            color: red;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .config-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-secondary);
            color: var(--accent-tertiary);
            border: 1px solid var(--accent-tertiary);
            padding: 10px 15px;
            font-family: 'VT323', monospace;
            font-size: 16px;
            cursor: pointer;
            z-index: 1001;
            opacity: 0.5;
            transition: all 0.3s;
        }

        .config-btn:hover {
            opacity: 1;
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        @media (max-width: 768px) {
            .profile-section {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body data-theme="dark">
    <button class="theme-toggle" onclick="toggleTheme()">◐ LIGHT</button>
    <button class="config-btn" onclick="showConfigModal()">⚙ CONFIG</button>

    <div class="container">
        <header>
            <h1>🎮 RETRO ACHIEVEMENTS</h1>
        </header>

        <div id="content">
            <div class="loading">LOADING...</div>
        </div>

        <footer>
            <p>POWERED BY RETROACHIEVEMENTS.ORG API</p>
            <p style="margin-top: 10px; font-size: 14px;">
                Get your API key: 
                <a href="https://retroachievements.org/controlpanel.php" 
                   style="color: var(--accent-primary);" 
                   target="_blank">Control Panel</a>
            </p>
        </footer>
    </div>

    <!-- Credentials Modal -->
    <div id="configModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">⚙ RETROACHIEVEMENTS CONFIG</h2>
            
            <div class="form-group">
                <label class="form-label">USERNAME:</label>
                <input type="text" id="inputUsername" class="form-input" 
                       placeholder="Enter your RetroAchievements username">
                <p class="form-help">Your username on RetroAchievements.org</p>
            </div>
            
            <div class="form-group">
                <label class="form-label">API KEY:</label>
                <input type="password" id="inputApiKey" class="form-input" 
                       placeholder="Enter your RetroAchievements API key">
                <p class="form-help">
                    Get your API key from: 
                    <a href="https://retroachievements.org/controlpanel.php" 
                       style="color: var(--accent-tertiary);" 
                       target="_blank">Control Panel</a>
                </p>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="clearConfig()">CLEAR</button>
                <button class="btn btn-primary" onclick="saveConfig()">SAVE & LOAD</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration from localStorage
        let CONFIG = {
            username: '',
            apiKey: '',
            apiBaseUrl: 'https://retroachievements.org',
            recentAchievementsCount: 10
        };

        // Theme Toggle
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);

            const button = document.querySelector('.theme-toggle');
            button.textContent = newTheme === 'dark' ? '◐ LIGHT' : '◐ DARK';

            localStorage.setItem('theme', newTheme);
        }

        // Load saved theme
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);
            const button = document.querySelector('.theme-toggle');
            button.textContent = savedTheme === 'dark' ? '◐ LIGHT' : '◐ DARK';
        }

        // Show config modal
        function showConfigModal() {
            document.getElementById('configModal').classList.add('active');
            
            // Load existing values
            const savedConfig = localStorage.getItem('raConfig');
            if (savedConfig) {
                const config = JSON.parse(savedConfig);
                document.getElementById('inputUsername').value = config.username || '';
                document.getElementById('inputApiKey').value = config.apiKey || '';
            }
        }

        // Save config
        function saveConfig() {
            const username = document.getElementById('inputUsername').value.trim();
            const apiKey = document.getElementById('inputApiKey').value.trim();

            if (!username || !apiKey) {
                alert('❌ Please enter both username and API key!');
                return;
            }

            CONFIG.username = username;
            CONFIG.apiKey = apiKey;

            // Save to localStorage
            localStorage.setItem('raConfig', JSON.stringify(CONFIG));

            // Close modal
            document.getElementById('configModal').classList.remove('active');

            // Load data
            loadData();
        }

        // Clear config
        function clearConfig() {
            localStorage.removeItem('raConfig');
            document.getElementById('inputUsername').value = '';
            document.getElementById('inputApiKey').value = '';
            CONFIG.username = '';
            CONFIG.apiKey = '';
            
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <h3>⚠ CONFIGURATION CLEARED</h3>
                    <p>Please enter your credentials to continue.</p>
                </div>
            `;
        }

        // Fetch User Summary
        async function fetchUserSummary() {
            try {
                const url = `${CONFIG.apiBaseUrl}/API/API_GetUserSummary.php?u=${CONFIG.username}&z=${CONFIG.username}&y=${CONFIG.apiKey}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.Error) {
                    throw new Error(data.Error);
                }

                return data;
            } catch (error) {
                throw error;
            }
        }

        // Fetch Recent Achievements
        async function fetchRecentAchievements() {
            try {
                const url = `${CONFIG.apiBaseUrl}/API/API_GetUserRecentAchievements.php?u=${CONFIG.username}&z=${CONFIG.username}&y=${CONFIG.apiKey}&c=1&m=720`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.Error) {
                    throw new Error(data.Error);
                }

                return data;
            } catch (error) {
                throw error;
            }
        }

        // Render Profile
        function renderProfile(userData) {
            return `
                <div class="profile-section">
                    <div class="avatar-container">
                        <img id="userAvatar" src="avatar.png" alt="User Avatar" 
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%231a1a1a%22 width=%22200%22 height=%22200%22/%3E%3Ctext fill=%22%2300ff41%22 font-size=%2212%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENO AVATAR%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="user-info">
                        <div class="username">${userData.User}</div>
                        <div class="stats">
                            <div class="stat-box">
                                <div class="stat-label">TOTAL POINTS</div>
                                <div class="stat-value">${userData.TotalPoints + userData.TotalSoftcorePoints} PTS</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">GLOBAL RANK</div>
                                <div class="stat-value">#${userData.TotalRanked || '?'}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">ACHIEVEMENTS</div>
                                <div class="stat-value">${userData.TotalAchievements}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render Achievements
        function renderAchievements(achievements) {
            if (!achievements || achievements.length === 0) {
                return '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">No recent achievements</div>';
            }

            const achievementsHTML = achievements.map(ach => {
                const date = new Date(ach.Date * 1000);
                const dateStr = date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });

                return `
                    <div class="achievement-card">
                        <div class="achievement-title">${ach.Title}</div>
                        <div class="achievement-game">${ach.GameTitle}</div>
                        <div class="achievement-date">📅 ${dateStr}</div>
                    </div>
                `;
            }).join('');

            return `
                <h2 style="font-family: 'Press Start 2P', cursive; font-size: 14px; color: var(--accent-primary); margin-bottom: 20px; text-shadow: 0 0 10px var(--accent-primary);">
                    🏆 RECENT ACHIEVEMENTS
                </h2>
                <div class="achievements-grid">
                    ${achievementsHTML}
                </div>
            `;
        }

        // Load Data
        async function loadData() {
            const content = document.getElementById('content');
            
            if (!CONFIG.username || !CONFIG.apiKey) {
                content.innerHTML = `
                    <div class="error">
                        <h3>⚠ CONFIGURATION REQUIRED</h3>
                        <p>Please click the "⚙ CONFIG" button to enter your RetroAchievements credentials.</p>
                    </div>
                `;
                return;
            }

            content.innerHTML = '<div class="loading">LOADING RETRO DATA...</div>';

            try {
                const userData = await fetchUserSummary();
                const achievementsData = await fetchRecentAchievements();

                const profileHTML = renderProfile(userData);
                const achievementsHTML = renderAchievements(achievementsData);

                content.innerHTML = profileHTML + achievementsHTML;

            } catch (error) {
                content.innerHTML = `
                    <div class="error">
                        <h3>❌ ERROR LOADING DATA</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 10px;">Please check your credentials and try again.</p>
                    </div>
                `;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();

            // Load config from localStorage
            const savedConfig = localStorage.getItem('raConfig');
            if (savedConfig) {
                CONFIG = JSON.parse(savedConfig);
                loadData();
            } else {
                showConfigModal();
            }
        });
    </script>
</body>
</html>
