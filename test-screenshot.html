            background: #00cc33;
        }
        button:disabled {
            background: #666;

            margin-top: 20px;
            max-width: 100%;

        #result img {
            max-width: 100%;

            border-radius: 8px;

        function setStatus(msg, type) {
            const status = document.getElementById('status');
            status.innerHTML = `<div class="${type} status">${msg}</div>`;
        }

        function showResult(canvas) {
            const result = document.getElementById('result');
            try {
                const dataURL = canvas.toDataURL('image/png');
                console.log('Data URL length:', dataURL.length);

                result.innerHTML = `
                    <h3>✅ Screenshot Result:</h3>
                    <img src="${dataURL}" alt="Screenshot" style="max-width: 100%; border: 2px solid #00ff41; border-radius: 8px;">
                    <p style="margin-top: 10px;">Image size: ${canvas.width}x${canvas.height}px</p>
                    <p><a href="${dataURL}" download="test-screenshot.png" style="color: #00ff41;">Download Screenshot</a></p>
                `;
            } catch (error) {
                console.error('Error showing result:', error);
                result.innerHTML = `
                    <div class="error status">
                        <strong>Failed to display screenshot</strong><br>
                        Error: ${error.message}
                    </div>
                `;
            }
        }

        async function testWithBase64() {
            try {
                setStatus('🔄 Loading base64 avatar...', 'info');
                const img = document.getElementById('avatarImg');
                img.src = 'data:image/png;base64,' + avatarBase64;

                // Wait for image to actually load
                await new Promise((resolve) => {
                    img.onload = () => {
                        console.log('✅ Base64 image loaded');
                        resolve();
                    };
                    img.onerror = () => {
                        console.log('⚠️ Base64 image failed to load (this should not happen)');
                        resolve();
                    };
                    // Timeout after 2 seconds
                    setTimeout(resolve, 2000);
                });

                await captureScreenshot('base64');
            } catch (error) {
                setStatus(`❌ Base64 test failed: ${error.message}`, 'error');
            }
        }

        async function testWithLocalFile() {
            try {
                setStatus('🔄 Loading local avatar.png...', 'info');
                const img = document.getElementById('avatarImg');
                img.src = 'avatar.png';

                await new Promise((resolve) => {
                    img.onload = () => {
                        console.log('✅ Local image loaded');
                        resolve();
                    };
                    img.onerror = () => {
                        console.log('⚠️ Local image failed to load');
                        resolve();
                    };
                    setTimeout(resolve, 2000);
                });

                await captureScreenshot('local');
            } catch (error) {
                setStatus(`❌ Local file test failed: ${error.message}`, 'error');
            }
        }

        async function testWithRemoteURL() {
            try {
                setStatus('🔄 Loading remote avatar from RetroAchievements...', 'info');
                const img = document.getElementById('avatarImg');
                img.src = 'https://retroachievements.org/UserPic/cync48.png';

                await new Promise((resolve) => {
                    img.onload = () => {
                        console.log('✅ Remote image loaded');
                        resolve();
                    };
                    img.onerror = () => {
                        console.log('⚠️ Remote image failed to load (CORS issue expected)');
                        resolve();
                    };
                    setTimeout(resolve, 3000);
                });

                await captureScreenshot('remote');
            } catch (error) {
                setStatus(`❌ Remote URL test failed: ${error.message}`, 'error');
            }
        }

        async function captureScreenshot(testType) {
            try {
                setStatus('📸 Capturing screenshot...', 'info');
                const target = document.getElementById('captureTarget');

                // Wait for image to load
                const img = document.getElementById('avatarImg');
                if (!img.complete || img.naturalWidth === 0) {
                    setStatus('⏳ Waiting for image to load...', 'info');
                    await new Promise(resolve => {
                        img.onload = resolve;
                        img.onerror = () => {
                            setStatus('⚠️ Image failed to load, continuing anyway...', 'error');
                            resolve();
                        };
                        setTimeout(resolve, 3000);
                    });
                }

                console.log('Image loaded:', img.complete, 'Natural size:', img.naturalWidth, 'x', img.naturalHeight);
                console.log('Image src:', img.src.substring(0, 100) + '...');

                const canvas = await html2canvas(target, {
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#1a1a1a',
                    logging: true,
                    scale: 2,
                    imageTimeout: 5000
                });

                console.log('Canvas created:', canvas.width, 'x', canvas.height);

                setStatus(`✅ Success! (${testType} test)`, 'success');
                showResult(canvas);
            } catch (error) {
                setStatus(`❌ Error: ${error.message}`, 'error');
                console.error('Screenshot error:', error);
                console.error('Error stack:', error.stack);

                // Show error details
                const result = document.getElementById('result');
                result.innerHTML = `
                    <div class="error status">
                        <strong>Failed to capture screenshot</strong><br>
                        Error: ${error.message}<br>
                        <pre style="font-size: 12px; overflow: auto;">${error.stack}</pre>
                    </div>
                `;
            }
        }

        // Auto-run base64 test on load
        window.onload = () => {
            setStatus('✅ Test page loaded! Click buttons to test different scenarios.', 'success');
        };
    </script>
